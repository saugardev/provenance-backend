services:
  postgres:
    image: postgres:16-alpine
    container_name: livy-provenance-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: livy
      POSTGRES_PASSWORD: livy
      POSTGRES_DB: livy_provenance
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U livy -d livy_provenance"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  postgres_data:
